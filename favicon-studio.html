<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Favicon Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2ED;--panel:#EDEAE4;--border:#D8D4CC;--text:#1A1714;--text2:#6B6560;
  --accent:#2B5CE6;--accent-h:#1A44C8;--green:#1A7A4B;--green-bg:#E8F5EE;--green-border:#A8D5BC;
  --chip:#E2DED8;--card:#FFFFFF;--warn:#C0392B;
  --sans:'Instrument Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex}
/* ── PANEL ── */
#panel{
  width:284px;min-width:284px;background:var(--panel);border-right:1px solid var(--border);
  height:100vh;overflow-y:auto;padding:18px 14px 24px;display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.logo{display:flex;flex-direction:column;gap:2px}
.logo-title{font-size:15px;font-weight:700;letter-spacing:-.03em;color:var(--text)}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--text2);font-weight:400}
.divider{width:100%;height:1px;background:var(--border);flex-shrink:0}
.section-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
/* ── BUTTONS ── */
button{font-family:var(--sans);cursor:pointer;border:none;border-radius:6px;font-size:12.5px;font-weight:500;transition:all .15s;line-height:1}
.btn-primary{background:var(--accent);color:#fff;padding:9px 12px;width:100%}
.btn-primary:hover:not(:disabled){background:var(--accent-h)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 12px;width:100%}
.btn-secondary:hover{background:var(--chip)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 9px;font-size:11px;border-radius:5px;flex-shrink:0}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn-save{background:var(--green);color:#fff;padding:10px 12px;width:100%;font-size:13px;font-weight:600}
.btn-save:hover:not(:disabled){filter:brightness(1.08)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
/* ── INPUTS ── */
textarea{
  width:100%;height:108px;font-family:var(--mono);font-size:10.5px;
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:8px;resize:vertical;color:var(--text);line-height:1.5;
}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--text2)}
input[type="text"]{
  width:100%;font-family:var(--mono);font-size:11.5px;
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:6px 9px;color:var(--text);
}
input[type="text"]:focus{outline:none;border-color:var(--accent)}
/* ── PROGRESS ── */
.progress-wrap{display:flex;flex-direction:column;gap:4px}
.progress-track{background:var(--chip);border-radius:4px;height:5px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .25s;width:0%}
.progress-label{font-family:var(--mono);font-size:10px;color:var(--text2)}
/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{
  background:var(--chip);border:1px solid transparent;color:var(--text2);
  padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:500;cursor:pointer;transition:all .12s;
}
.chip:hover{border-color:var(--border);color:var(--text)}
.chip.active{background:var(--text);color:var(--bg);border-color:transparent}
/* ── MANIFEST STATUS ── */
.manifest-ok{
  background:var(--green-bg);border:1px solid var(--green-border);border-radius:6px;
  padding:7px 10px;font-size:10.5px;font-family:var(--mono);color:var(--green);
}
/* ── STATS ── */
.stats-box{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 11px;font-family:var(--mono);font-size:10.5px;line-height:1.85;
}
.srow{display:flex;justify-content:space-between}
.sk{color:var(--text2)}.sv{font-weight:600;color:var(--text)}
.s-warn{color:var(--warn);font-weight:700;font-size:10px;margin-top:2px}
.s-cats{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
/* ── REGEN ROW ── */
.regen-row{display:flex;gap:6px;align-items:center}
.regen-row input{flex:1}
/* ── GRID AREA ── */
#grid-area{flex:1;height:100vh;overflow-y:auto;padding:22px 24px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#grid-area::-webkit-scrollbar{width:5px}
#grid-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.grid-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.size-toggle{display:flex;gap:3px}
.sz-btn{
  background:var(--chip);border:1px solid transparent;color:var(--text2);
  padding:4px 10px;border-radius:5px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .12s;
}
.sz-btn.active{background:var(--text);color:var(--bg)}
.grid-total{font-size:11px;color:var(--text2);font-family:var(--mono)}
.grid-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:65vh;color:var(--text2);gap:8px;
}
.grid-empty-icon{font-size:36px;opacity:.4}
.grid-empty-title{font-size:14px;font-weight:600;color:var(--text2)}
.grid-empty-hint{font-size:11px;font-family:var(--mono);opacity:.55}
/* ── CATEGORY GROUP ── */
.cat-group{margin-bottom:32px}
.cat-header{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:7px;
}
.cat-badge{
  background:var(--chip);padding:1px 6px;border-radius:10px;
  font-size:9.5px;font-weight:500;color:var(--text2);letter-spacing:0;
}
/* ── FAVICON GRID ── */
.fav-grid{display:grid;gap:10px}
.fav-grid.sz-s{grid-template-columns:repeat(auto-fill,minmax(78px,1fr))}
.fav-grid.sz-m{grid-template-columns:repeat(auto-fill,minmax(116px,1fr))}
.fav-grid.sz-l{grid-template-columns:repeat(auto-fill,minmax(156px,1fr))}
/* ── FAVICON CARD ── */
.fav-card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:12px 8px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;
  position:relative;cursor:default;transition:box-shadow .15s,border-color .15s;
}
.fav-card:hover{box-shadow:0 2px 14px rgba(0,0,0,.09);border-color:#c8c4bc}
.fav-preview{display:flex;align-items:center;justify-content:center}
.fav-preview.sz-s{width:32px;height:32px}
.fav-preview.sz-m{width:48px;height:48px}
.fav-preview.sz-l{width:64px;height:64px}
.fav-preview svg{width:100%;height:100%}
.fav-domain{font-family:var(--mono);font-size:9px;color:var(--text2);text-align:center;word-break:break-all;line-height:1.3;max-width:100%}
.fav-abbr{background:var(--chip);color:var(--text2);font-family:var(--mono);font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px}
.fav-copy{
  position:absolute;top:5px;right:5px;background:transparent;
  border:1px solid var(--border);border-radius:3px;padding:2px 5px;font-size:9px;
  cursor:pointer;opacity:0;transition:opacity .1s;color:var(--text2);
}
.fav-card:hover .fav-copy{opacity:1}
.fav-copy:hover{background:var(--chip)}
.fav-tooltip{
  position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);font-family:var(--mono);font-size:8.5px;
  padding:4px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;
  z-index:100;opacity:0;transition:opacity .15s;
}
.fav-card:hover .fav-tooltip{opacity:1}
/* ── COPY FLASH ── */
.copy-flash{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);font-family:var(--mono);font-size:11px;
  padding:7px 14px;border-radius:6px;opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:9999;
}
.copy-flash.show{opacity:1}
</style>
</head>
<body>

<!-- ──────────────── LEFT PANEL ──────────────── -->
<aside id="panel">

  <div class="logo">
    <div class="logo-title">Favicon Studio</div>
    <div class="logo-sub">batch SVG · Plan B · manifest.json</div>
  </div>

  <div class="divider"></div>

  <!-- LOAD MANIFEST -->
  <div>
    <input type="file" id="file-input" accept=".json" style="display:none">
    <button class="btn-secondary" id="btn-load">↑ Завантажити маніфест</button>
    <div id="manifest-status" style="margin-top:8px;display:none"></div>
  </div>

  <div class="divider"></div>

  <!-- PASTE INPUT -->
  <div>
    <div class="section-label">Paste з Excel</div>
    <textarea id="domain-input" placeholder="ID&#9;domain.com&#9;Site Name&#9;AB&#10;domain2.com&#9;XY&#10;domain3.com"></textarea>
  </div>

  <!-- ICON LOADING PROGRESS -->
  <div id="icon-progress" class="progress-wrap">
    <div class="section-label">Іконки</div>
    <div class="progress-track"><div class="progress-fill" id="prog-bar"></div></div>
    <div class="progress-label" id="prog-label">Завантаження…</div>
  </div>

  <!-- GENERATE -->
  <button class="btn-primary" id="btn-gen" disabled>⚡ Згенерувати</button>

  <div class="divider"></div>

  <!-- FILTERS -->
  <div>
    <div class="section-label">Палітра</div>
    <div class="chips" id="chips-palette">
      <div class="chip active" data-v="all">Всі</div>
      <div class="chip" data-v="warm">Warm</div>
      <div class="chip" data-v="pastel">Pastel</div>
      <div class="chip" data-v="cool">Cool</div>
      <div class="chip" data-v="earth">Earth</div>
      <div class="chip" data-v="vibrant">Vibrant</div>
    </div>
  </div>

  <div>
    <div class="section-label">Форма</div>
    <div class="chips" id="chips-shape">
      <div class="chip active" data-v="all">Всі</div>
      <div class="chip" data-v="circle">●</div>
      <div class="chip" data-v="soft">▢ soft</div>
      <div class="chip" data-v="pill">⬭</div>
      <div class="chip" data-v="squircle">▣</div>
      <div class="chip" data-v="sharp">□</div>
      <div class="chip" data-v="round">▢ rnd</div>
      <div class="chip" data-v="scallop-10">✿10</div>
      <div class="chip" data-v="scallop-14">❋14</div>
    </div>
  </div>

  <!-- REGEN ONE DOMAIN -->
  <div>
    <div class="section-label">Регенерація домену</div>
    <div class="regen-row">
      <input type="text" id="regen-input" placeholder="domain.com">
      <button class="btn-ghost" id="btn-regen">↺</button>
    </div>
  </div>

  <!-- STATS -->
  <div id="stats-wrap" style="display:none">
    <div class="section-label">Статистика</div>
    <div class="stats-box" id="stats-box"></div>
  </div>

  <div class="divider"></div>

  <!-- PRIMARY: SAVE MANIFEST -->
  <button class="btn-save" id="btn-manifest" disabled>↓ Зберегти manifest.json</button>
  <!-- SECONDARY: ZIP BACKUP -->
  <button class="btn-secondary" id="btn-zip" disabled style="margin-top:6px">↓ Скачати ZIP як backup</button>

</aside>

<!-- ──────────────── GRID AREA ──────────────── -->
<main id="grid-area">
  <div class="grid-bar">
    <div class="size-toggle">
      <button class="sz-btn" data-s="s">S</button>
      <button class="sz-btn active" data-s="m">M</button>
      <button class="sz-btn" data-s="l">L</button>
    </div>
    <div class="grid-total" id="grid-total"></div>
  </div>
  <div id="grid-content">
    <div class="grid-empty">
      <div class="grid-empty-icon">⬡</div>
      <div class="grid-empty-title">Favicon Studio</div>
      <div class="grid-empty-hint">paste домени → Згенерувати</div>
    </div>
  </div>
</main>

<!-- COPY FLASH -->
<div class="copy-flash" id="copy-flash">SVG скопійовано ✓</div>

  'travel','best','the','all','top','find','visit','motel','inn','lodge',
];

const CDN = {
  lucide: n=>`https://unpkg.com/lucide-static@latest/icons/${n}.svg`,
  tabler: n=>`https://unpkg.com/@tabler/icons@latest/icons/outline/${n}.svg`,
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let iconCache     = {};   // 'lib:name' → inner SVG string
let existingMFest = {};   // domain → entry (from loaded manifest)
let usedCombos    = new Set();
let generated     = {};   // domain → entry (current session)
let domGIdx       = 0;    // global counter for unique gradient IDs in DOM
let iconsReady    = false;
let filterPal     = 'all';
let filterShape   = 'all';
let gridSize      = 'm';

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str.toLowerCase().trim()));
  return new Uint8Array(buf);
}

function luminance(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const l=c=>c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4);
  return .2126*l(r)+.7152*l(g)+.0722*l(b);
}
function iconColor(c1) { return luminance(c1)>.35?'rgba(20,14,10,0.88)':'rgba(255,255,255,0.95)'; }

function normalizeDomain(domain) {
  let s = domain.toLowerCase();
  // strip all TLD parts (up to last 2 dots)
  s = s.replace(/(\.[a-z]{2,})+$/, '');
  // strip dashes, underscores, dots
  return s.replace(/[-_.]/g, '');
}

function extractAbbr(domain, raw) {
  // Col4 IS the source of truth — designer provides unique abbreviations per domain.
  // BBF, BBB, BBN, BBT etc. are all intentionally distinct — do NOT slice to 2.
  // Max 3 chars (font-size handles it). Empty col4 → derive from domain.
  if (raw && raw.trim()) return raw.trim().slice(0,3).toUpperCase();
  // No col4 → derive up to 2 chars from meaningful domain part
  let n = domain.toLowerCase().replace(/(\.[a-z]{2,})+$/, '').replace(/[-_.]/g,'');
  for (const p of STRIP_PREFIXES) {
    const pn = p.replace(/[-_]/g,'');
    if (n.startsWith(pn)) { n = n.slice(pn.length); break; }
  }
  return (n.slice(0,2).toUpperCase() || 'X');
}

function findCatEntry(domain) {
  const norm = normalizeDomain(domain);
  for (const e of ICON_MAP) {
    for (const kw of e.kw) {
      if (norm.includes(kw.replace(/[-_]/g,''))) return e;
    }
  }
  return null; // no keyword matched → caller uses Abbr text
}

function scallopPoints(cx,cy,R,amp,n,steps=200) {
  const pts=[];
  for(let i=0;i<steps;i++){
    const t=2*Math.PI*i/steps, r=R+amp*Math.cos(n*t);
    pts.push(`${(cx+r*Math.cos(t)).toFixed(2)},${(cy+r*Math.sin(t)).toFixed(2)}`);
  }
  return pts.join(' ');
}

function shapeEl(key) {
  switch(key){
    case 'circle':     return `<circle cx="16" cy="16" r="15.5"/>`;
    case 'soft':       return `<rect width="32" height="32" rx="8"/>`;
    case 'pill':       return `<rect width="32" height="32" rx="14"/>`;
    case 'squircle':   return `<rect width="32" height="32" rx="11"/>`;
    case 'sharp':      return `<rect width="32" height="32" rx="4"/>`;
    case 'round':      return `<rect width="32" height="32" rx="10"/>`;
    case 'scallop-10': return `<polygon points="${scallopPoints(16,16,13.5,1.5,10)}"/>`;
    case 'scallop-14': return `<polygon points="${scallopPoints(16,16,13.8,1.0,14)}"/>`;
  }
  return `<rect width="32" height="32" rx="8"/>`;
}

function iconTransform(key) {
  return key.startsWith('scallop') ? 'translate(9,9) scale(0.583)' : 'translate(7,7) scale(0.75)';
}

// ═══════════════════════════════════════════════════════════
// ICON LOADING
// ═══════════════════════════════════════════════════════════
function allIconKeys() {
  const s=new Set();
  for(const e of ICON_MAP) for(const i of e.icons) s.add(`${i.l}:${i.n}`);
  return [...s];
}

async function fetchOneIcon(lib, name) {
  const key=`${lib}:${name}`, ck=`fav-icon-v2-${key}`; // v2 prefix busts old poisoned cache (old key had circle stub)
  const cached=localStorage.getItem(ck);
  if(cached){ iconCache[key]=cached; return; } // only non-empty strings are stored on success
  try{
    const res=await fetch(CDN[lib](name));
    if(!res.ok) throw new Error(res.status);
    const txt=await res.text();
    const inner=txt.replace(/<svg[^>]*>/,'').replace(/<\/svg>/,'').trim();
    iconCache[key]=inner;
    try{ localStorage.setItem(ck,inner); }catch(e){}
  }catch(e){
    console.warn(`icon fail ${key}`,e);
    iconCache[key]=''; // falsy → buildContent uses Abbr text; NOT persisted so next session retries
  }
}

async function loadAllIcons() {
  const keys=allIconKeys();
  const bar=document.getElementById('prog-bar'), lbl=document.getElementById('prog-label');
  let done=0;
  const BATCH=6;
  for(let i=0;i<keys.length;i+=BATCH){
    const batch=keys.slice(i,i+BATCH);
    await Promise.all(batch.map(k=>{ const[l,n]=k.split(':'); return fetchOneIcon(l,n); }));
    done+=batch.length;
    const pct=Math.round(done/keys.length*100);
    bar.style.width=pct+'%';
    lbl.textContent=`${done}/${keys.length} · ${pct}%`;
    await tick();
  }
  iconsReady=true;
  document.getElementById('btn-gen').disabled=false;
  lbl.textContent=`✓ ${keys.length} іконок готові`;
  bar.style.background='var(--green)';
}

function tick(ms=0){ return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════════════════════
// SVG BUILDERS
// ═══════════════════════════════════════════════════════════

// For DOM preview: uses unique gId to avoid class/gradient conflicts
function buildPreviewSVG(entry, gId) {
  const pal=PALETTES[entry.palette];
  const [c1,c2]=pal[entry.palette_idx % pal.length];
  const ic=iconColor(c1);
  const gName=`G${gId}`;
  const gradDef=buildGradDef(gName, entry.gradient, c1, c2);
  const content=buildContent(entry, gId, ic, true);
  const style=`<style>.bg${gId}{}.ic${gId}{stroke:${ic};fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.lb${gId}{fill:${ic}}@media(prefers-color-scheme:dark){.bg${gId}{filter:brightness(.62) saturate(.82)}.ic${gId}{stroke:rgba(255,255,255,.92)!important}.lb${gId}{fill:rgba(255,255,255,.92)!important}}</style>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><defs>${gradDef}</defs>${style}<g class="bg${gId}" fill="url(#${gName})">${shapeEl(entry.shape)}</g>${content}</svg>`;
}

// For manifest: each SVG is standalone, uses simple 'G' id (no DOM conflict)
function buildManifestSVG(entry) {
  const pal=PALETTES[entry.palette];
  const [c1,c2]=pal[entry.palette_idx % pal.length];
  const ic=iconColor(c1);
  const gradDef=buildGradDef('G', entry.gradient, c1, c2);
  const content=buildContent(entry, 'm', ic, false);
  const style=`<style>.bgm{}.icm{stroke:${ic};fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.lbm{fill:${ic}}@media(prefers-color-scheme:dark){.bgm{filter:brightness(.62) saturate(.82)}.icm{stroke:rgba(255,255,255,.92)!important}.lbm{fill:rgba(255,255,255,.92)!important}}</style>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><defs>${gradDef}</defs>${style}<g class="bgm" fill="url(#G)">${shapeEl(entry.shape)}</g>${content}</svg>`;
}

function buildGradDef(id, grad, c1, c2) {
  switch(grad){
    case 'diagonal':         return `<linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient>`;
    case 'reverse-diagonal': return `<linearGradient id="${id}" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient>`;
    case 'vertical':         return `<linearGradient id="${id}" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient>`;
    case 'horizontal':       return `<linearGradient id="${id}" x1="0%" y1="50%" x2="100%" y2="50%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient>`;
    case 'radial-corner':    return `<radialGradient id="${id}" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></radialGradient>`;
    case 'radial-center':    return `<radialGradient id="${id}" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></radialGradient>`;
  }
  return `<linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient>`;
}

function buildContent(entry, suffix, ic, forDom) {
  const icClass=`ic${suffix}`, lbClass=`lb${suffix}`;

  let paths = '';
  if(!entry.useText && entry.icon){
    // Try assigned icon first
    const key=`${entry.lib}:${entry.icon}`;
    paths = iconCache[key]||'';

    // Assigned icon failed → try other icons from same category (first one that loaded)
    if(!paths && entry.category){
      const catEntry = ICON_MAP.find(e=>e.cat===entry.category);
      if(catEntry){
        for(const ico of catEntry.icons){
          const k=`${ico.l}:${ico.n}`;
          if(iconCache[k]){ paths=iconCache[k]; break; }
        }
      }
    }
  }

  if(!entry.useText && paths){
    return `<g transform="${iconTransform(entry.shape)}" class="${icClass}">${paths}</g>`;
  } else {
    const fs=entry.abbr.length===1?15:entry.abbr.length===2?11:8.5;
    return `<text x="16" y="16" dominant-baseline="central" text-anchor="middle" font-weight="700" font-family="system-ui,sans-serif" font-size="${fs}" class="${lbClass}">${entry.abbr}</text>`;
  }
}

// ═══════════════════════════════════════════════════════════
// DOMAIN PARSING
// ═══════════════════════════════════════════════════════════
function parseDomains(text) {
  const lines=text.trim().split('\n').filter(l=>l.trim());
  const seen=new Set(), out=[];
  for(const line of lines){
    const parts=line.trim().split(/\t/);
    let domain='', abbr='';
    if(parts.length>=4){
      domain=parts[1].trim(); abbr=parts[3].trim();
    } else if(parts.length===2){
      domain=parts[0].trim(); abbr=parts[1].trim();
    } else {
      domain=parts[0].trim(); abbr='';
    }
    domain=domain.toLowerCase().replace(/^https?:\/\//,'').replace(/\/$/, '').trim();
    if(!domain||seen.has(domain)) continue;
    seen.add(domain);
    out.push({ domain, abbr: extractAbbr(domain, abbr) });
  }
  return out;
}

// ═══════════════════════════════════════════════════════════
// GENERATION
// ═══════════════════════════════════════════════════════════
async function computeEntry(domain, abbr, offset) {
  const h=await sha256(domain);
  const ce=findCatEntry(domain);

  // Palette with soft bias
  let palIdx=(h[0]^h[6]^h[12]^h[18]+offset)%5;
  if(ce && ce.bias!==null){
    const biasIdx=PAL_NAMES.indexOf(ce.bias);
    if(biasIdx>=0 && (h[4]+offset)%5 < 3) palIdx=biasIdx;
  }

  const palette    = PAL_NAMES[palIdx];
  const palette_idx= (h[1]^h[7]^h[13]^h[19]+offset)%16;
  const gradient   = GRADS[(h[2]^h[8]+offset)%6];
  const shape      = SHAPES[(h[3]^h[9]+offset)%8];

  // No keyword matched → text mode (Abbr), no icon
  if(!ce){
    return {
      abbr, category:'text', icon:null, lib:null, useText:true,
      palette, palette_idx, shape, gradient,
      combo_key:`${palette}-${shape}-${gradient}-text`,
    };
  }

  const iconIdx = (h[5]^h[11]^h[17]+offset)%ce.icons.length;
  const ico     = ce.icons[iconIdx];

  return {
    abbr, category:ce.cat, icon:ico.n, lib:ico.l, useText:false,
    palette, palette_idx, shape, gradient,
    combo_key:`${palette}-${shape}-${gradient}-${ico.n}`,
  };
}

async function generateAll(domainList) {
  const result={}, stats={total:0,fresh:0,fromManifest:0,collisions:0}, cats={};
  const localUsed=new Set(usedCombos);

  for(let i=0;i<domainList.length;i++){
    const {domain,abbr}=domainList[i];

    if(existingMFest[domain]){
      // Reuse from loaded manifest
      const old=existingMFest[domain];
      const gId=domGIdx++;
      const previewSvg=buildPreviewSVG(old,gId);
      const manifestSvg=buildManifestSVG(old);
      result[domain]={...old, _previewSvg:previewSvg, svg:manifestSvg};
      stats.fromManifest++;
      cats[old.category]=(cats[old.category]||0)+1;
    } else {
      let entry, offset=0;
      while(true){
        entry=await computeEntry(domain,abbr,offset);
        if(!localUsed.has(entry.combo_key)) break;
        offset++; stats.collisions++;
        if(offset>120) break;
      }
      localUsed.add(entry.combo_key);
      const gId=domGIdx++;
      const previewSvg=buildPreviewSVG(entry,gId);
      const manifestSvg=buildManifestSVG(entry);
      result[domain]={...entry, _previewSvg:previewSvg, svg:manifestSvg};
      stats.fresh++;
      cats[entry.category]=(cats[entry.category]||0)+1;
    }
    stats.total++;
    if(i%20===0) await tick();
  }
  return {result,stats,cats};
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderGrid() {
  const container=document.getElementById('grid-content');
  const totalEl=document.getElementById('grid-total');
  const entries=Object.entries(generated);

  const filtered=entries.filter(([,e])=>{
    if(filterPal!=='all'&&e.palette!==filterPal) return false;
    if(filterShape!=='all'&&e.shape!==filterShape) return false;
    return true;
  });

  totalEl.textContent=`${filtered.length} / ${entries.length} доменів`;

  if(!filtered.length){
    container.innerHTML='<div class="grid-empty"><div class="grid-empty-icon">∅</div><div class="grid-empty-title">Нічого не знайдено</div><div class="grid-empty-hint">Змініть фільтри</div></div>';
    return;
  }

  // Group by category
  const groups={};
  for(const [d,e] of filtered){
    const c=e.category||'hotel';
    if(!groups[c]) groups[c]=[];
    groups[c].push([d,e]);
  }

  let html='';
  for(const [cat,items] of Object.entries(groups).sort()){
    html+=`<div class="cat-group"><div class="cat-header">${cat}<span class="cat-badge">${items.length}</span></div><div class="fav-grid sz-${gridSize}">`;
    for(const [domain,e] of items){
      const svgHtml=e._previewSvg||'';
      const tooltip=`${e.palette} · ${e.shape} · ${e.gradient}`;
      html+=`<div class="fav-card">
        <div class="fav-tooltip">${tooltip}</div>
        <div class="fav-preview sz-${gridSize}">${svgHtml}</div>
        <div class="fav-domain">${domain}</div>
        <div class="fav-abbr">${e.abbr}</div>
        <button class="fav-copy" onclick="copySVG(event,'${domain.replace(/'/g,"\\'")}')">SVG</button>
      </div>`;
    }
    html+=`</div></div>`;
  }
  container.innerHTML=html;
}

function renderStats(stats, cats) {
  const total=Object.keys(generated).length;
  const uniqueKeys=new Set(Object.values(generated).map(e=>e.combo_key)).size;
  const upct=total>0?Math.round(uniqueKeys/total*100):100;

  const catRows=Object.entries(cats).sort((a,b)=>b[1]-a[1])
    .map(([c,n])=>`<div class="srow"><span class="sk">${c.toUpperCase()}</span><span class="sv">${n}</span></div>`)
    .join('');

  const warn=upct<80?`<div class="s-warn">⚠ Унікальність ${upct}% — нижче 80%!</div>`:'';

  document.getElementById('stats-box').innerHTML=`
    <div class="srow"><span class="sk">Всього</span><span class="sv">${total}</span></div>
    <div class="srow"><span class="sk">Нових</span><span class="sv">${stats.fresh}</span></div>
    <div class="srow"><span class="sk">Зі старого</span><span class="sv">${stats.fromManifest}</span></div>
    <div class="srow"><span class="sk">Колізій</span><span class="sv">${stats.collisions}</span></div>
    <div class="srow"><span class="sk">% унікальності</span><span class="sv">${upct}%</span></div>
    ${warn}
    <div class="s-cats">${catRows}</div>
  `;
  document.getElementById('stats-wrap').style.display='block';
}

// ═══════════════════════════════════════════════════════════
// COPY SVG
// ═══════════════════════════════════════════════════════════
function copySVG(e, domain) {
  e.stopPropagation();
  const entry=generated[domain];
  if(!entry) return;
  navigator.clipboard.writeText(entry.svg||entry._previewSvg||'').then(()=>{
    const flash=document.getElementById('copy-flash');
    flash.classList.add('show');
    setTimeout(()=>flash.classList.remove('show'),1800);
  });
}

// ═══════════════════════════════════════════════════════════
// EXPORT: MANIFEST
// ═══════════════════════════════════════════════════════════
function saveManifest() {
  const merged={};
  // Start with loaded manifest (old domains preserved)
  for(const [d,e] of Object.entries(existingMFest)) merged[d]=e;
  // Overwrite/add generated entries (strip _previewSvg)
  for(const [d,e] of Object.entries(generated)){
    const {_previewSvg,...clean}=e;
    merged[d]=clean;
  }
  const manifest={
    generated: new Date().toISOString(),
    total: Object.keys(merged).length,
    domains: merged,
  };
  const blob=new Blob([JSON.stringify(manifest,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='manifest.json'; a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════
// EXPORT: ZIP
// ═══════════════════════════════════════════════════════════
async function downloadZip() {
  const btn=document.getElementById('btn-zip');
  btn.disabled=true; btn.textContent='⏳ Пакуємо…';
  const zip=new JSZip();
  const date=new Date().toISOString().slice(0,10);
  const count=Object.keys(generated).length;
  for(const [domain,entry] of Object.entries(generated)){
    const folder=zip.folder(domain);
    folder.file('favicon.svg',entry.svg||'');
    folder.file('markup.html',
      `<link rel="icon" href="/favicon.svg" type="image/svg+xml">\n`+
      `<link rel="icon" href="/favicon.ico" sizes="32x32">\n`+
      `<link rel="apple-touch-icon" href="/apple-touch-icon.png">`
    );
  }
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`favicons-${count}-${date}.zip`; a.click();
  URL.revokeObjectURL(url);
  btn.disabled=false; btn.textContent='↓ Скачати ZIP як backup';
}

// ═══════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════

// Load manifest
document.getElementById('btn-load').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  const text=await file.text();
  try{
    const data=JSON.parse(text);
    existingMFest=data.domains||{};
    usedCombos=new Set(Object.values(existingMFest).map(v=>v.combo_key).filter(Boolean));
    const status=document.getElementById('manifest-status');
    status.style.display='block';
    status.innerHTML=`<div class="manifest-ok">✓ ${Object.keys(existingMFest).length} доменів · ${usedCombos.size} combo_key</div>`;
  }catch(err){ alert('Помилка читання JSON: '+err.message); }
  e.target.value='';
});

// Generate
document.getElementById('btn-gen').addEventListener('click',async()=>{
  const text=document.getElementById('domain-input').value;
  if(!text.trim()) return;
  const domains=parseDomains(text);
  if(!domains.length) return;

  const btn=document.getElementById('btn-gen');
  btn.disabled=true; btn.textContent='⏳ Генерую…';

  const {result,stats,cats}=await generateAll(domains);
  generated=result;

  renderGrid();
  renderStats(stats,cats);
  document.getElementById('btn-manifest').disabled=false;
  document.getElementById('btn-zip').disabled=false;

  btn.disabled=false; btn.textContent='⚡ Згенерувати';
});

// Regen single domain
document.getElementById('btn-regen').addEventListener('click',async()=>{
  const domain=document.getElementById('regen-input').value.trim().toLowerCase();
  if(!domain) return;

  const oldAbbr=generated[domain]?.abbr||extractAbbr(domain,'');
  // Temporarily remove this domain's combo from used set to allow fresh pick
  const oldCombo=generated[domain]?.combo_key;

  // Build current used combos excluding this domain
  const currentUsed=new Set(
    Object.entries(generated).filter(([d])=>d!==domain).map(([,e])=>e.combo_key)
  );
  for(const c of usedCombos) currentUsed.add(c);

  let entry, offset=0;
  while(true){
    entry=await computeEntry(domain,oldAbbr,offset);
    if(!currentUsed.has(entry.combo_key)) break;
    offset++;
    if(offset>120) break;
  }

  const gId=domGIdx++;
  const previewSvg=buildPreviewSVG(entry,gId);
  const manifestSvg=buildManifestSVG(entry);
  generated[domain]={...entry,_previewSvg:previewSvg,svg:manifestSvg};
  renderGrid();
});

// Palette chips
document.getElementById('chips-palette').addEventListener('click',e=>{
  const chip=e.target.closest('.chip'); if(!chip) return;
  document.querySelectorAll('#chips-palette .chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  filterPal=chip.dataset.v;
  renderGrid();
});

// Shape chips
document.getElementById('chips-shape').addEventListener('click',e=>{
  const chip=e.target.closest('.chip'); if(!chip) return;
  document.querySelectorAll('#chips-shape .chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  filterShape=chip.dataset.v;
  renderGrid();
});

// Size toggle
document.querySelectorAll('.sz-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    gridSize=btn.dataset.s;
    renderGrid();
  });
});

// Export buttons
document.getElementById('btn-manifest').addEventListener('click',saveManifest);
document.getElementById('btn-zip').addEventListener('click',downloadZip);

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadAllIcons();
</script>
</body>
